<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png" />
  <title>Frontend Mentor | IP Address Tracker</title>

  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>

  <style>
    /* =====================================================================
       SMOOTH MODE INTERPOLATION VIA color-mix()
       --mode (0-100) is set on documentElement by App.tsx as a percentage.
       Each color token is computed as a color-mix between its light and dark
       endpoints, weighted by --mode. The browser interpolates colors smoothly
       — moving the slider produces a continuous gradient transition with no
       visible "snap" between modes.

       color-mix() is supported in Chrome 111+, Firefox 113+, Safari 16.2+
       (all evergreen). MDN: developer.mozilla.org/en-US/docs/Web/CSS/color_value/color-mix
    ===================================================================== */
    :root {
      --mode: 0%;

      /* Light → dark endpoint pairs */
      --ink-900-light: #2b2b2b;
      --ink-900-dark: #f1f5f9;
      --ink-700-light: #535353;
      --ink-700-dark: #cbd5e1;
      --ink-600-light: #767676;
      --ink-600-dark: #94a3b8;
      --ink-500-light: #949494;
      --ink-500-dark: #64748b;
      --surface-0-light: #ffffff;
      --surface-0-dark: #1a1a2e;
      --surface-1-light: #eef2f8;
      --surface-1-dark: #1a1a2e;
      --brand-700-light: #4743a0;
      --brand-700-dark: #818cf8;
      --brand-600-light: #5262c6;
      --brand-600-dark: #a5b4fc;
      --brand-500-light: #5e83ee;
      --brand-500-dark: #c4b5fd;

      /* Mixed values — re-evaluated whenever --mode changes */
      --ink-900: color-mix(in srgb, var(--ink-900-light), var(--ink-900-dark) var(--mode));
      --ink-700: color-mix(in srgb, var(--ink-700-light), var(--ink-700-dark) var(--mode));
      --ink-600: color-mix(in srgb, var(--ink-600-light), var(--ink-600-dark) var(--mode));
      --ink-500: color-mix(in srgb, var(--ink-500-light), var(--ink-500-dark) var(--mode));
      --surface-0: color-mix(in srgb, var(--surface-0-light), var(--surface-0-dark) var(--mode));
      --surface-1: color-mix(in srgb, var(--surface-1-light), var(--surface-1-dark) var(--mode));
      --brand-700: color-mix(in srgb, var(--brand-700-light), var(--brand-700-dark) var(--mode));
      --brand-600: color-mix(in srgb, var(--brand-600-light), var(--brand-600-dark) var(--mode));
      --brand-500: color-mix(in srgb, var(--brand-500-light), var(--brand-500-dark) var(--mode));

      --focus-ring: var(--brand-600);
      --danger: #ef4444;

      /* Neumorphic shadows — these mix between light/dark variants too */
      --neu-shadow-dark: color-mix(in srgb, rgba(163, 177, 198, 0.45), rgba(0, 0, 0, 0.55) var(--mode));
      --neu-shadow-light: color-mix(in srgb, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.04) var(--mode));
      --neu-out: 10px 10px 24px var(--neu-shadow-dark), -8px -8px 20px var(--neu-shadow-light);
      --neu-soft: 6px 6px 14px var(--neu-shadow-dark), -4px -4px 12px var(--neu-shadow-light);
      --neu-in: inset 4px 4px 8px var(--neu-shadow-dark), inset -3px -3px 6px var(--neu-shadow-light);

      --t-fast: 160ms ease;
    }

    /* ===== RESET & BASE ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: 'Rubik', system-ui, sans-serif;
      color: var(--ink-900);
      background: var(--surface-1);
      -webkit-font-smoothing: antialiased;
    }

    button {
      font: inherit;
      cursor: pointer;
    }

    ul {
      list-style: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    /* ===== A11Y HELPERS ===== */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip-path: inset(50%);
      white-space: nowrap;
      border: 0;
    }

    .skip-link {
      position: absolute;
      left: -9999px;
      top: 0;
      z-index: 10000;
      background: var(--ink-900);
      color: var(--surface-0);
      padding: 0.75rem 1rem;
      text-decoration: none;
      font-size: 0.85rem;
      border-radius: 0 0 0.5rem 0;
    }

    .skip-link:focus {
      left: 0;
    }

    button:focus-visible,
    input:focus-visible,
    a:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    /* ===== APP SHELL ===== */
    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .shell {
      flex: 1;
      background: var(--surface-1);
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      padding: 2rem 1rem;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      animation: fadeUp 0.24s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @media (min-width: 600px) {
      .page {
        padding: 2.5rem 1.5rem;
      }
    }

    .page-title {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .page-subtitle {
      color: var(--ink-600);
      font-size: 0.95rem;
      margin-top: 0.25rem;
    }

    /* ===== BUTTONS ===== */
    .btn {
      padding: 0.85rem 1.75rem;
      border: none;
      border-radius: 9999px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: transform var(--t-fast), filter var(--t-fast);
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .btn:active:not(:disabled) {
      transform: translateY(1px);
    }

    .btn:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .btn--primary {
      background: linear-gradient(135deg, var(--brand-700), var(--brand-600));
      color: #fff;
      box-shadow: 0 8px 24px rgb(82 98 198 / 0.35);
    }

    .btn--primary:hover:not(:disabled) {
      filter: brightness(0.97);
    }

    .btn--neu {
      background: var(--surface-1);
      color: var(--ink-900);
      box-shadow: var(--neu-soft);
    }

    .btn--ghost-danger {
      background: var(--surface-1);
      color: var(--danger);
      box-shadow: var(--neu-soft);
    }

    .btn--small {
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
    }

    .btn--sm-primary {
      padding: 0.5rem 1rem;
      background: linear-gradient(135deg, var(--brand-500), var(--brand-600));
      color: #fff;
      box-shadow: 0 4px 12px rgb(82 98 198 / 0.35);
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* ===== NEUMORPHIC CARDS ===== */
    .neu-card {
      background: var(--surface-1);
      border-radius: 20px;
      box-shadow: var(--neu-out);
      padding: 1.4rem 1.6rem;
    }

    /* =====================================================================
       TRACKER PAGE — stacking order
       Info-wrap sits BETWEEN hero and map as a sibling (not inside hero).
       z-index comparison is straightforward:
         .info-wrap (z:50) > .hero (z:5) > .map-section (z:1)
       This avoids nested stacking context traps entirely.
    ===================================================================== */
    .tracker {
      display: flex;
      flex-direction: column;
      flex: 1;
      isolation: isolate;
    }

    .hero {
      background:
        url("/images/pattern-bg-mobile.png") center / cover no-repeat,
        linear-gradient(180deg, var(--brand-700), var(--brand-600));
      text-align: center;
      padding: 1.25rem 1rem 5.5rem;
      position: relative;
      z-index: 5;
    }

    @media (min-width: 600px) {
      .hero {
        background:
          url("/images/pattern-bg-desktop.png") center / cover no-repeat,
          linear-gradient(180deg, var(--brand-700), var(--brand-600));
        padding: 1.5rem 2rem 8rem;
      }
    }

    @media (min-width: 900px) {
      .hero {
        padding: 2rem 2rem 9rem;
      }
    }

    .hero__bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      max-width: 1110px;
      margin: 0 auto 0.75rem;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .hero__title {
      color: #fff;
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .hero__status {
      color: #fff;
      font-size: 0.8rem;
      min-height: 1.2em;
      opacity: 0.92;
      margin-top: 0.5rem;
      padding: 0 0.5rem;
    }

    .hero__status--error {
      color: #fecaca;
      opacity: 1;
    }

    /* On mobile, the track pill and theme card sit in a compact row */
    @media (max-width: 599px) {
      .hero__bar {
        margin-bottom: 0.5rem;
      }

      .hero__bar>div {
        width: min(220px, calc(100% - 7rem)) !important;
      }

      .theme-card {
        padding: 0.55rem;
        gap: 0.45rem;
        border-radius: 12px;
      }

      .theme-row__label {
        font-size: 0.65rem;
        margin-bottom: 0.25rem;
      }

      .slider {
        height: 6px;
      }
    }

    /* ===== SEARCH FORM ===== */
    .search {
      max-width: 34rem;
      margin: 0 auto;
      padding: 0 0.25rem;
    }

    @media (min-width: 600px) {
      .search {
        padding: 0 0.5rem;
      }
    }

    .search__bar {
      display: flex;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgb(0 0 0 / 0.15);
      background: #fff;
    }

    .search__input {
      flex: 1;
      padding: 1rem 1.5rem;
      border: none;
      background: transparent;
      font: inherit;
      font-size: 18px;
      color: var(--ink-900-light);
      outline: none;
      min-width: 0;
    }

    .search__input::placeholder {
      color: var(--ink-500);
    }

    .search__input:focus {
      box-shadow: inset 0 0 0 3px var(--focus-ring);
    }

    .search__submit {
      background: var(--ink-900-light);
      border: none;
      padding: 0 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--t-fast);
    }

    .search__submit:hover:not(:disabled) {
      background: hsl(0, 0%, 35%);
    }

    .search__submit:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .search__submit:focus-visible {
      outline: 3px solid #fff;
      outline-offset: -3px;
    }

    /* ===== TRACK PATH PILL ===== */
    .pill {
      background: rgb(255 255 255 / 0.18);
      backdrop-filter: blur(8px);
      border: 1px solid rgb(255 255 255 / 0.3);
      color: #fff;
      padding: 0.5rem 0.95rem;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: background var(--t-fast);
    }

    .pill[aria-pressed="true"] {
      background: linear-gradient(135deg, var(--brand-500), var(--brand-600));
    }

    /* =====================================================================
       INFO CARDS — sibling element between hero and map
       Uses negative margin to pull up into the hero's bottom padding,
       creating the overlapping card effect from the FM design.
       position:relative + z-index:50 means it sits in the same stacking
       context as .map-section (z:1), so it's GUARANTEED to paint above
       the map. No nested stacking context traps.
    ===================================================================== */
    .info-wrap {
      position: relative;
      z-index: 50;
      margin-top: -3.5rem;
      margin-bottom: -2rem;
      padding: 0 1rem;
    }

    @media (min-width: 600px) {
      .info-wrap {
        margin-top: -4rem;
        margin-bottom: -3rem;
        padding: 0 1.5rem;
      }
    }

    @media (min-width: 900px) {
      .info-wrap {
        margin-top: -4.5rem;
        margin-bottom: -3.5rem;
        padding: 0 2rem;
      }
    }

    .info {
      display: grid;
      grid-template-columns: 1fr;
      background: var(--surface-0);
      border-radius: 15px;
      padding: 1.5rem 1rem;
      box-shadow: 0 18px 40px rgb(43 43 43 / 0.16);
      max-width: 1110px;
      margin: 0 auto;
      text-align: center;
    }

    .info__cell {
      padding: 0.6rem 0.5rem;
    }

    .info__label {
      font-size: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 1.75px;
      color: var(--ink-600);
      font-weight: 700;
      margin-bottom: 0.45rem;
    }

    .info__value {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--ink-900);
      word-break: break-word;
    }

    .info__toggle {
      margin-left: 0.5rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.7rem;
      color: var(--brand-600);
      text-decoration: underline;
    }

    @media (min-width: 600px) {
      .info {
        grid-template-columns: repeat(2, 1fr);
        padding: 2rem 1.5rem;
        gap: 0.5rem;
        text-align: left;
      }

      .info__cell {
        padding: 0.5rem 1rem;
      }
    }

    @media (min-width: 900px) {
      .info {
        grid-template-columns: repeat(4, 1fr);
        padding: 2.25rem 2rem;
        gap: 0;
      }

      .info__cell {
        padding: 0.5rem 2rem;
      }

      .info__cell:not(:last-child) {
        border-right: 1px solid hsla(0, 0%, 59%, 0.3);
      }

      .info__label {
        font-size: 0.7rem;
        margin-bottom: 0.65rem;
      }

      .info__value {
        font-size: 1.5rem;
      }
    }

    /* ===== MAP — stays BELOW info-wrap in stacking order ===== */
    .map-section {
      flex: 1;
      position: relative;
      z-index: 1;
      min-height: 300px;
    }

    @media (min-width: 600px) {
      .map-section {
        min-height: 400px;
      }
    }

    .map {
      width: 100%;
      height: 100%;
      min-height: inherit;
    }

    /* =====================================================================
       LANDING PAGE — bold visible content in front of 3D background
    ===================================================================== */
    .landing {
      flex: 1;
      position: relative;
      background: var(--surface-1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      isolation: isolate;
    }

    .landing__corner {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      width: min(200px, calc(100% - 1.5rem));
      z-index: 10;
    }

    @media (min-width: 480px) {
      .landing__corner {
        width: min(240px, calc(100% - 2rem));
        top: 1rem;
        right: 1rem;
      }
    }

    @media (min-width: 600px) {
      .landing__corner {
        top: 1.25rem;
        right: 1.25rem;
        width: min(280px, calc(100% - 2.5rem));
      }
    }

    .landing__hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(5rem, 12vw, 5.5rem) clamp(1.25rem, 4vw, 5rem) clamp(2rem, 4vw, 5rem);
      max-width: 900px;
      position: relative;
      z-index: 5;
    }

    .landing__eyebrow {
      color: var(--brand-600);
      font-size: clamp(0.7rem, 1.6vw, 0.85rem);
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .landing__h1 {
      color: var(--ink-900);
      font-size: clamp(2.5rem, 11vw, 7rem);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.04em;
      margin-bottom: 1rem;
    }

    .landing__lead {
      color: var(--ink-900);
      font-size: clamp(1.05rem, 2.5vw, 1.5rem);
      font-weight: 700;
      line-height: 1.35;
      max-width: 540px;
      margin-bottom: 0.85rem;
    }

    .landing__sub {
      color: var(--ink-700);
      font-size: clamp(0.95rem, 1.8vw, 1.1rem);
      font-weight: 400;
      line-height: 1.55;
      max-width: 520px;
      margin-bottom: 2rem;
    }

    .landing__ctas {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    @media (max-width: 480px) {
      .landing__ctas .btn {
        width: 100%;
      }
    }

    .topo-bg {
      position: absolute;
      inset: 0;
      z-index: -1;
      opacity: 0.55;
      pointer-events: none;
    }

    /* ===== THEME CONTROLS ===== */
    .theme-card {
      padding: 0.95rem;
      background: var(--surface-1);
      border-radius: 20px;
      box-shadow: var(--neu-out);
      display: flex;
      flex-direction: column;
      gap: 0.95rem;
    }

    .theme-row__label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--ink-700);
      margin-bottom: 0.45rem;
      font-weight: 500;
    }

    .theme-row__label> :last-child {
      font-weight: 600;
    }

    .slider {
      width: 100%;
      height: 10px;
      border-radius: 5px;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      outline: none;
      box-shadow: var(--neu-in);
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff, #cbd5e1);
      box-shadow: 2px 2px 6px rgb(0 0 0 / 0.3), -1px -1px 4px rgb(255 255 255 / 0.7);
      cursor: pointer;
      border: 2px solid var(--brand-600);
    }

    .slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff, #cbd5e1);
      box-shadow: 2px 2px 6px rgb(0 0 0 / 0.3), -1px -1px 4px rgb(255 255 255 / 0.7);
      cursor: pointer;
      border: 2px solid var(--brand-600);
    }

    /* ===== SAVED SEARCHES ===== */
    .saved-list {
      display: grid;
      gap: 0.75rem;
    }

    .saved-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      background: var(--surface-1);
      border-radius: 16px;
      box-shadow: var(--neu-soft);
      flex-wrap: wrap;
    }

    .saved-item__main {
      flex: 1;
      min-width: 150px;
    }

    .saved-item__actions {
      display: flex;
      gap: 0.4rem;
    }

    .saved-item__ip {
      color: var(--ink-900);
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.15rem;
    }

    .saved-item__loc {
      color: var(--ink-600);
      font-size: 0.8rem;
    }

    .saved-item__time {
      color: var(--ink-600);
      font-size: 0.7rem;
      margin-top: 0.15rem;
    }

    .saved-empty {
      padding: 3rem 1rem;
      text-align: center;
    }

    /* ===== ABOUT GRID ===== */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    @media (min-width: 600px) {
      .about-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1.25rem;
      }
    }

    @media (min-width: 900px) {
      .about-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .about-card {
      padding: 1.4rem 1.6rem;
      background: var(--surface-1);
      border-radius: 16px;
      box-shadow: var(--neu-soft);
    }

    .about-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--ink-900);
    }

    .about-card p {
      font-size: 0.875rem;
      line-height: 1.55;
      color: var(--ink-600);
    }

    /* ===== SITEMAP ===== */
    .sitemap {
      padding: 0.7rem 1rem;
      text-align: center;
      background: var(--surface-1);
      box-shadow: inset 0 4px 8px rgb(0 0 0 / 0.08);
    }

    .sitemap__list {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .sitemap__btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.7rem;
      color: var(--ink-600);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 400;
    }

    .sitemap__btn[aria-current="page"] {
      font-weight: 700;
      color: var(--brand-600);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .sitemap__copy {
      font-size: 0.65rem;
      color: var(--ink-600);
      margin-top: 0.35rem;
    }

    /* ===== NIGHT MODE OVERLAY ===== */
    .night-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      transition: background-color 0.3s ease;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
